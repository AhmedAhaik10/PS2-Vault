<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS2 Vault Bedroom Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: #fff; }
        #canvas-container { width: 100vw; height: 100vh; display: block; position: absolute; top:0; left:0; z-index: 1;}
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }

        .btn {
            pointer-events: auto; padding: 15px 30px; font-size: 1.2rem; cursor: pointer;
            background: rgba(0, 0, 0, 0.7); color: #00d2ff; border: 2px solid #00d2ff;
            text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s;
            text-shadow: 0 0 5px #00d2ff; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            display: none; /* hidden initially */
        }
        .btn:hover { background: rgba(0, 210, 255, 0.2); box-shadow: 0 0 20px rgba(0, 210, 255, 0.6); }
        .btn:active { transform: scale(0.95); }

        #browse-btn, #back-btn { position: absolute; bottom: 50px; }
        
        #game-info {
            position: absolute; right: 50px; top: 50%; transform: translateY(-50%);
            width: 350px; background: rgba(0, 10, 20, 0.85); border: 1px solid #00d2ff;
            padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(5px); pointer-events: auto; opacity: 0; transition: opacity 0.5s;
            display: none;
        }
        #game-info h2 { margin-top: 0; color: #00d2ff; font-size: 1.5rem; text-shadow: 0 0 5px #00d2ff; }
        .info-row { margin-bottom: 10px; font-size: 0.9rem; }
        .info-label { color: #888; font-weight: bold; }
        .summary { margin-top: 15px; font-size: 0.85rem; line-height: 1.4; color: #ccc; max-height: 200px; overflow-y: auto; }
        
        #put-back-btn { margin-top: 20px; width: 100%; font-size: 1rem; padding: 10px; display: block; }

        /* Custom Scrollbar for summary */
        .summary::-webkit-scrollbar { width: 6px; }
        .summary::-webkit-scrollbar-track { background: rgba(0, 210, 255, 0.1); }
        .summary::-webkit-scrollbar-thumb { background: #00d2ff; border-radius: 4px; }
        
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; color: #00d2ff; text-shadow: 0 0 10px #00d2ff; z-index: 20;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div id="error-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0.8); z-index:99999; display:none; pointer-events:none; padding:20px; font-family:monospace; white-space:pre-wrap; color:white; font-size:18px; box-sizing:border-box;"></div>
    <script>
        const errorOverlay = document.getElementById('error-overlay');
        function showError(msg) {
            errorOverlay.style.display = 'block';
            errorOverlay.innerText += msg + '\n------------------------\n';
        }
        window.onerror = function(msg, url, line, col, error) {
            showError("WINDOW ERROR: " + msg + '\n' + (error ? error.stack : ''));
        };
        window.addEventListener("unhandledrejection", function(e) {
            showError("PROMISE ERROR: " + (e.reason && e.reason.stack ? e.reason.stack : e.reason));
        });
        const originalError = console.error;
        console.error = function(...args) {
            showError("CONSOLE.ERROR: " + args.map(a=>String(a)).join(' '));
            originalError.apply(console, args);
        };
    </script>
    <div id="loading">LOADING SYSTEM...</div>
    <div id="ui-layer">
        <button id="browse-btn" class="btn">Browse Games</button>
        <button id="back-btn" class="btn">Room View</button>
        
        <div id="game-info">
            <h2 id="gi-title">Game Title</h2>
            <div class="info-row"><span class="info-label">Released:</span> <span id="gi-date"></span></div>
            <div class="info-row"><span class="info-label">Genre:</span> <span id="gi-genre"></span></div>
            <div class="info-row"><span class="info-label">Developer:</span> <span id="gi-dev"></span></div>
            <div class="info-row"><span class="info-label">Multiplayer:</span> <span id="gi-multi"></span></div>
            <div class="info-row"><span class="info-label">Rating:</span> <span id="gi-rating"></span>/100</div>
            <div class="summary" id="gi-summary"></div>
            <button id="put-back-btn" class="btn">Put It Back</button>
        </div>
    </div>
    
    <div id="canvas-container"></div>

    <script>
        // CONFIG
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSuXRzkVSUoFVMqdi_SOuStKI8z4XZ4PSd94bQbVpIIr7n1TrNGTP7Vm61GnIl_3YHsNRSmMkIjvaNM/pub?gid=0&single=true&output=csv';
        const TEXTURE_LOADER = new THREE.TextureLoader();
        TEXTURE_LOADER.crossOrigin = 'Anonymous';
        
        // SCENE STATE
        let scene, camera, renderer;
        let tvLight, ambientLight;
        let gameObjects = [];
        let raycaster, mouse;
        let hoveredGame = null;
        let selectedGame = null;
        let isAnimating = false;

        // Camera States
        const CAM_POS_START = { x: 0, y: 18, z: 35 };
        const CAM_TARGET_START = new THREE.Vector3(5, 12, -40);
        
        const CAM_POS_SHELF = { x: 25, y: 15, z: -10 };
        const CAM_TARGET_SHELF = new THREE.Vector3(25, 18, -40);

        // Object to hold tween targets so lookAt updates every frame
        const camTargetObj = { x: CAM_TARGET_START.x, y: CAM_TARGET_START.y, z: CAM_TARGET_START.z };

        // UI Elements
        const loadingEl = document.getElementById('loading');
        const browseBtn = document.getElementById('browse-btn');
        const backBtn = document.getElementById('back-btn');
        const giPanel = document.getElementById('game-info');
        const putBackBtn = document.getElementById('put-back-btn');

        // Textures
        let floorTexture;

        init();

        function init() {
            // ThreeJS Init
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050510, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(CAM_POS_START.x, CAM_POS_START.y, CAM_POS_START.z);
            camera.lookAt(CAM_TARGET_START);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Lighting
            ambientLight = new THREE.AmbientLight(0x111122, 0.6); // Slightly brighter night light
            scene.add(ambientLight);

            // Subtle ceiling bounce light to illuminate the room corners
            const roomLight = new THREE.PointLight(0x444455, 0.5, 120);
            roomLight.position.set(0, 30, 0);
            scene.add(roomLight);

            // TV Glow
            tvLight = new THREE.PointLight(0x00aaff, 1.5, 60);
            tvLight.position.set(2, 13, -37);
            tvLight.castShadow = true;
            tvLight.shadow.bias = -0.001;
            scene.add(tvLight);

            // Create procedural carpet texture
            floorTexture = createCarpetTexture();

            buildRoom();
            
            // Events
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', onClick);
            
            browseBtn.addEventListener('click', navigateToShelf);
            backBtn.addEventListener('click', navigateToRoom);
            putBackBtn.addEventListener('click', putGameBack);

            // Fetch Data
            fetchData();
            
            // Start Loop
            animate();
        }

        // --- Data Loading --- //
        function fetchData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    loadingEl.style.display = 'none';
                    browseBtn.style.display = 'block';
                    buildShelf(results.data);
                },
                error: function(err) {
                    console.error("Error parsing CSV:", err);
                    loadingEl.innerText = "ERROR LOADING DATA";
                }
            });
        }

        // --- Geometry Builders --- //
        function createCarpetTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#112233';
            ctx.fillRect(0,0,512,512);
            for(let i=0; i<10000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)';
                ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(8, 8);
            return tex;
        }

        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#2f1a0e'; // dark wood
            ctx.fillRect(0,0,256,256);
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            for(let i=0; i<100; i++){
                ctx.fillRect(0, Math.random()*256, 256, Math.random()*3+1);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function buildRoom() {
            const roomGeo = new THREE.BoxGeometry(80, 40, 90);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a3040, side: THREE.BackSide, roughness: 0.9 });
            const floorMat = new THREE.MeshStandardMaterial({ map: floorTexture, side: THREE.BackSide, roughness: 1.0 });
            const ceilingMat = new THREE.MeshStandardMaterial({ color: 0x111115, side: THREE.BackSide });
            
            // Materials for walls, floor, ceiling
            const roomMaterials = [ wallMat, wallMat, ceilingMat, floorMat, wallMat, wallMat ];
            const room = new THREE.Mesh(roomGeo, roomMaterials);
            room.position.y = 20;
            room.receiveShadow = true;
            scene.add(room);

            // Desk
            const deskGeo = new THREE.BoxGeometry(20, 1, 15);
            const woodTex = createWoodTexture();
            const woodMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.8 });
            
            const deskTop = new THREE.Mesh(deskGeo, woodMat);
            deskTop.position.set(0, 8, -38);
            deskTop.receiveShadow = true;
            deskTop.castShadow = true;
            scene.add(deskTop);

            const legGeo = new THREE.BoxGeometry(1, 8, 1);
            const leg1 = new THREE.Mesh(legGeo, woodMat); leg1.position.set(-9, 4, -31); leg1.castShadow=true; scene.add(leg1);
            const leg2 = new THREE.Mesh(legGeo, woodMat); leg2.position.set(9, 4, -31); leg2.castShadow=true; scene.add(leg2);
            const leg3 = new THREE.Mesh(legGeo, woodMat); leg3.position.set(-9, 4, -45); leg3.castShadow=true; scene.add(leg3);
            const leg4 = new THREE.Mesh(legGeo, woodMat); leg4.position.set(9, 4, -45); leg4.castShadow=true; scene.add(leg4);

            // CRT TV
            const tvMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4 });
            const tvCase = new THREE.Mesh(new THREE.BoxGeometry(8, 7, 7), tvMat);
            tvCase.position.set(0, 12, -40);
            tvCase.castShadow = true;
            scene.add(tvCase);

            const screenMat = new THREE.MeshBasicMaterial({ color: 0xcceeff });
            const screen = new THREE.Mesh(new THREE.PlaneGeometry(6.5, 5), screenMat);
            screen.position.set(0, 12, -36.4);
            scene.add(screen);

            // ============================================================
            // PS2 Logo Sign above TV
            // ============================================================

            const bannerCanvas = document.createElement('canvas');
            bannerCanvas.width = 512; bannerCanvas.height = 100;
            const bctx = bannerCanvas.getContext('2d');

            // Dark semi-transparent backing
            bctx.fillStyle = 'rgba(2,6,18,0.85)';
            bctx.fillRect(0, 0, 512, 100);

            const bannerTex = new THREE.CanvasTexture(bannerCanvas);
            const bannerMat = new THREE.MeshBasicMaterial({ map: bannerTex, transparent: true });
            const bannerPlane = new THREE.Mesh(new THREE.PlaneGeometry(14, 2.8), bannerMat);
            
            // Move it a little bit above (from 17.8 to 21)
            bannerPlane.position.set(0, 21.0, -39.85);
            scene.add(bannerPlane);

            // Load and draw the user's logo in the center
            const userLogo = new Image();
            userLogo.onload = function() {
                bctx.save();
                // Screen blending mode makes the black background of the user's image transparent
                bctx.globalCompositeOperation = 'screen';
                
                // Add a cyan glow behind it
                bctx.shadowBlur = 20;
                bctx.shadowColor = '#00d2ff';
                
                // The banner is 512x100. Draw the square image in the center.
                const imgSize = 400;
                bctx.drawImage(userLogo, 256 - imgSize/2, 50 - imgSize/2, imgSize, imgSize);
                bctx.restore();
                
                bannerTex.needsUpdate = true; // Refresh the 3D texture
            };
            userLogo.src = 'ps2logo.jpg';

            // LED light source cast from the sign
            const neonLight = new THREE.PointLight(0x00d2ff, 1.2, 55);
            // Move light up to match the sign
            neonLight.position.set(0, 21.2, -38);
            scene.add(neonLight);

            // PS2 Console (Moved to ground)
            const ps2Mat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.3 });
            const ps2Group = new THREE.Group();
            const ps2 = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 5), ps2Mat);
            ps2.castShadow = true;
            ps2Group.add(ps2);
            // Blue LED
            const led = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({ color: 0x0044ff }));
            led.position.set(-1.4, 0, 2.5);
            ps2Group.add(led);
            ps2Group.position.set(0, 0.5, -30); // Floor center
            scene.add(ps2Group);

            // PS2 Controller
            const padGroup = new THREE.Group();
            const padMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6 });
            
            // center block
            const padCenter = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.3, 0.8), padMat);
            padCenter.castShadow = true;
            padGroup.add(padCenter);
            
            // grips
            const padGripGeo = new THREE.CylinderGeometry(0.3, 0.2, 1.2, 12);
            padGripGeo.rotateX(Math.PI / 2);
            padGripGeo.rotateZ(Math.PI / 8); 
            const gripL = new THREE.Mesh(padGripGeo, padMat);
            gripL.position.set(-0.8, 0, 0.3);
            gripL.castShadow = true;
            padGroup.add(gripL);
            
            const padGripGeoR = new THREE.CylinderGeometry(0.3, 0.2, 1.2, 12);
            padGripGeoR.rotateX(Math.PI / 2);
            padGripGeoR.rotateZ(-Math.PI / 8); // reverse angle
            const gripR = new THREE.Mesh(padGripGeoR, padMat);
            gripR.position.set(0.8, 0, 0.3);
            gripR.castShadow = true;
            padGroup.add(gripR);

            // small analog sticks
            const stickGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.2, 8);
            const stickL = new THREE.Mesh(stickGeo, new THREE.MeshStandardMaterial({color: 0x222222}));
            stickL.position.set(-0.35, 0.2, 0.2);
            padGroup.add(stickL);
            const stickR = new THREE.Mesh(stickGeo, new THREE.MeshStandardMaterial({color: 0x222222}));
            stickR.position.set(0.35, 0.2, 0.2);
            padGroup.add(stickR);

            padGroup.position.set(3, 0.15, -27); // near console
            padGroup.rotation.y = -Math.PI / 6;
            scene.add(padGroup);

            // Wires
            const wireMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.8 });
            
            // Cable 1: TV to Console
            const tvCableCurve = new THREE.QuadraticBezierCurve3(
                new THREE.Vector3(0, 9, -38), // TV back/bottom
                new THREE.Vector3(0, 0, -36),  // Sag to floor
                new THREE.Vector3(0, 0.2, -32.5) // Console back
            );
            const tvCable = new THREE.Mesh(new THREE.TubeGeometry(tvCableCurve, 20, 0.05, 8, false), wireMat);
            tvCable.castShadow = true;
            scene.add(tvCable);

            // Cable 2: Console to Controller
            const padCableCurve = new THREE.QuadraticBezierCurve3(
                new THREE.Vector3(-0.8, 0.2, -27.5), // Console front port
                new THREE.Vector3(0.5, 0.05, -24),   // Slack on floor
                new THREE.Vector3(2.5, 0.15, -27.2) // Controller top connection
            );
            const padCable = new THREE.Mesh(new THREE.TubeGeometry(padCableCurve, 20, 0.04, 8, false), wireMat);
            padCable.castShadow = true;
            scene.add(padCable);

            // Bed
            const bedGeo = new THREE.BoxGeometry(18, 4, 30);
            const bedMat = new THREE.MeshStandardMaterial({ color: 0x4a2a3a, roughness: 0.7 }); // dark red/purple frame
            const bed = new THREE.Mesh(bedGeo, bedMat);
            bed.position.set(-30, 2, 20);
            bed.castShadow = true;
            bed.receiveShadow = true;
            scene.add(bed);
            
            // Blanket
            const blanketGeo = new THREE.BoxGeometry(18.5, 1, 22);
            const blanketMat = new THREE.MeshStandardMaterial({ color: 0x224466, roughness: 0.9}); // blue blanket
            const blanket = new THREE.Mesh(blanketGeo, blanketMat);
            blanket.position.set(-30, 4.2, 24);
            blanket.castShadow = true;
            scene.add(blanket);

            // Pillow
            const pillowGeo = new THREE.BoxGeometry(10, 1, 6);
            const pillowMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
            const pillow = new THREE.Mesh(pillowGeo, pillowMat);
            pillow.position.set(-30, 4.5, 8);
            pillow.castShadow = true;
            scene.add(pillow);

            // Posters (Planes slightly off the wall)
            const posterGeo = new THREE.PlaneGeometry(8, 12);
            const posterMat1 = new THREE.MeshStandardMaterial({ color: 0x660000 }); // fake poster
            const poster1 = new THREE.Mesh(posterGeo, posterMat1);
            poster1.position.set(-15, 20, -44.9);
            scene.add(poster1);

            const posterGeo2 = new THREE.PlaneGeometry(10, 7);
            const posterMat2 = new THREE.MeshStandardMaterial({ color: 0x005511 });
            const poster2 = new THREE.Mesh(posterGeo2, posterMat2);
            poster2.position.set(15, 22, -44.9);
            scene.add(poster2);
        }

        // Creates a default blue PS2 spine texture
        function createSpineTexture(title) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // Base PS2 Blue spine
            ctx.fillStyle = '#0a1d47';
            ctx.fillRect(0,0,64,256);
            
            // PS2 Logo block (black)
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,64,30);
            // PS2 white text simulation
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText('PS2', 20, 20);

            // Game Title
            ctx.save();
            ctx.translate(32, 240);
            ctx.rotate(-Math.PI / 2);
            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left';
            
            // truncate title
            let dispTitle = title || "Unknown";
            if(dispTitle.length > 25) dispTitle = dispTitle.substring(0, 22) + '...';
            ctx.fillText(dispTitle, 0, 5);
            ctx.restore();

            return new THREE.CanvasTexture(canvas);
        }

        function createCoverFallback(title) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 360;
            const ctx = canvas.getContext('2d');
            
            // gradient background
            const grad = ctx.createLinearGradient(0,0,0,360);
            grad.addColorStop(0, '#111');
            grad.addColorStop(1, '#001a33');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,256,360);

            // Box top (PS2 banner)
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,256,40);

            // Title
            ctx.fillStyle = '#00d2ff';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            wrapText(ctx, title || 'Unknown Game', 128, 150, 230, 30);
            
            return new THREE.CanvasTexture(canvas);
        }

        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            let words = text.split(' ');
            let line = '';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = context.measureText(testLine);
                let testWidth = metrics.width;
                if (testWidth > maxWidth && n > 0) {
                    context.fillText(line, x, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            context.fillText(line, x, y);
        }

        function buildShelf(data) {
            // Shelf Structure Next to Desk
            const woodTex = createWoodTexture();
            const woodMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.8 });
            
            const shelfX = 25;
            const shelfZ = -42;
            const shelfWidth = 18;
            const shelfDepth = 5;
            const shelfSpacing = 5.5;

            // Shelves
            for(let i=0; i<4; i++) {
                const s = new THREE.Mesh(new THREE.BoxGeometry(shelfWidth, 0.4, shelfDepth), woodMat);
                s.position.set(shelfX, 5 + (i * shelfSpacing), shelfZ);
                s.receiveShadow = true;
                scene.add(s);
            }
            // Vertical supports
            const v1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 20, shelfDepth), woodMat);
            v1.position.set(shelfX - shelfWidth/2, 14, shelfZ);
            scene.add(v1);
            const v2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 20, shelfDepth), woodMat);
            v2.position.set(shelfX + shelfWidth/2, 14, shelfZ);
            scene.add(v2);

            // Populate Games
            // Sort to ensure consistent placement if needed, or just iterate valid entries
            let validGames = data.filter(d => d.name && d.name.trim() !== "");
            
            // PS2 game case dims
            const gw = 0.5, gh = 4.5, gd = 3.5;
            const caseGeo = new THREE.BoxGeometry(gw, gh, gd);
            
            let row = 0;
            let col = 0;
            const maxCols = 28; // fits on shelf Width 18 with spacing ~0.6

            validGames.forEach((game, index) => {
                if (col >= maxCols) { col = 0; row++; }
                if (row >= 3) return; // Only 3 shelves to fill

                // Materials
                // Attempt to load cover, use fallback if fails
                const spineTex = createSpineTexture(game.name);
                const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
                const spineMat = new THREE.MeshStandardMaterial({ map: spineTex });
                
                // Front Cover material (fallback initially)
                const frontMat = new THREE.MeshStandardMaterial({ map: createCoverFallback(game.name) });

                // Try loading image (CORS might block this, so we handle onError silently)
                if(game.cover_url) {
                    TEXTURE_LOADER.load(
                        game.cover_url, 
                        (tex) => { 
                            frontMat.map = tex; 
                            frontMat.needsUpdate = true;
                        }, 
                        undefined, 
                        (err) => { /* CORS error or bad url, keep fallback */ }
                    );
                }

                // Box faces: [Right, Left, Top, Bottom, Front, Back] (Spine is Front or left depending on rotation)
                // Let's make Z facing out (spine)
                // If width is X, height is Y, depth is Z
                // Right=0, Left=1, Top=2, Bottom=3, Front=4 (+z), Back=5 (-z)
                // For a case on a shelf: spine is Front. Width is tiny. Depth is long.
                const mats = [
                    blackMat,  // Right face (back of case if oriented normally)
                    frontMat,  // Left face (front cover)
                    blackMat,  // Top
                    blackMat,  // Bottom
                    spineMat,  // Front (+z) (SPINE facing user)
                    blackMat   // Back (-z)
                ];

                const caseMesh = new THREE.Mesh(caseGeo, mats);
                
                // Position calculation
                const xPos = (shelfX - shelfWidth/2 + 1) + (col * (gw + 0.05));
                const yPos = 5 + (row * shelfSpacing) + gh/2 + 0.2;
                const zPos = shelfZ + gd/2;

                caseMesh.position.set(xPos, yPos, zPos);
                caseMesh.castShadow = true;
                caseMesh.receiveShadow = true;
                
                // Store original transform for tweening back
                caseMesh.userData = {
                    originalPos: new THREE.Vector3(xPos, yPos, zPos),
                    originalRot: new THREE.Euler().copy(caseMesh.rotation),
                    gameData: game
                };

                scene.add(caseMesh);
                gameObjects.push(caseMesh);
                col++;
            });
        }

        // --- Interaction & Raycasting --- //
        function onMouseMove(event) {
            // Normalize mouse
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if(isAnimating) return; // Disable hover while zooming/interacting

            raycaster.setFromCamera(mouse, camera);

            // Only check games if camera is at shelf
            // Distance check to ensure we only hover when close
            const isNearShelf = camera.position.distanceTo(new THREE.Vector3(CAM_POS_SHELF.x, CAM_POS_SHELF.y, CAM_POS_SHELF.z)) < 5;
            
            if (isNearShelf && !selectedGame) {
                const intersects = raycaster.intersectObjects(gameObjects);
                if (intersects.length > 0) {
                    const object = intersects[0].object;
                    if (hoveredGame !== object) {
                        resetHover();
                        hoveredGame = object;
                        document.body.style.cursor = 'pointer';
                        
                        // Highlight effects
                        // Tween highlight pull out
                        new TWEEN.Tween(hoveredGame.position)
                            .to({ z: hoveredGame.userData.originalPos.z + 1.5 }, 200)
                            .easing(TWEEN.Easing.Quadratic.Out)
                            .start();
                    }
                } else {
                    resetHover();
                }
            } else {
                resetHover();
            }
        }

        function resetHover() {
            if (hoveredGame && hoveredGame !== selectedGame) {
                new TWEEN.Tween(hoveredGame.position)
                    .to({ z: hoveredGame.userData.originalPos.z }, 200)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
                hoveredGame = null;
                document.body.style.cursor = 'default';
            }
        }

        function onClick(event) {
            if(isAnimating) return;
            if(hoveredGame && !selectedGame) {
                selectGame(hoveredGame);
            }
        }

        function selectGame(gameMesh) {
            selectedGame = gameMesh;
            isAnimating = true;
            document.body.style.cursor = 'default';

            // Tween Game to camera
            // Calc position in front of camera
            const floatPos = new THREE.Vector3();
            camera.getWorldDirection(floatPos);
            floatPos.multiplyScalar(6); // 6 units in front
            floatPos.add(camera.position);

            const tgtRot = new THREE.Euler(camera.rotation.x, camera.rotation.y + Math.PI/2, camera.rotation.z);

            new TWEEN.Tween(gameMesh.position)
                .to({ x: floatPos.x, y: floatPos.y, z: floatPos.z }, 800)
                .easing(TWEEN.Easing.Cubic.Out)
                .start();

            new TWEEN.Tween(gameMesh.rotation)
                .to({ x: tgtRot.x, y: tgtRot.y, z: tgtRot.z }, 800)
                .easing(TWEEN.Easing.Cubic.Out)
                .onComplete(() => {
                    isAnimating = false;
                    showGameUI(gameMesh.userData.gameData);
                })
                .start();

            // Flash TV Glow based on rating (green=high, orange=mid, red=low)
            const rating = parseFloat(gameMesh.userData.gameData.aggregated_rating || 50);
            let color = new THREE.Color(0x00aaff); // Default cyan
            if(rating >= 80) color.setHex(0x33ff33);
            else if(rating >= 60) color.setHex(0xffaa00);
            else color.setHex(0xff3333);

            new TWEEN.Tween(tvLight.color)
                .to({ r: color.r, g: color.g, b: color.b }, 1000)
                .start();
        }

        function putGameBack() {
            if(!selectedGame) return;
            isAnimating = true;
            hideGameUI();

            new TWEEN.Tween(selectedGame.position)
                .to({ 
                    x: selectedGame.userData.originalPos.x, 
                    y: selectedGame.userData.originalPos.y, 
                    z: selectedGame.userData.originalPos.z 
                }, 800)
                .easing(TWEEN.Easing.Cubic.InOut)
                .start();

            new TWEEN.Tween(selectedGame.rotation)
                .to({ 
                    x: selectedGame.userData.originalRot.x, 
                    y: selectedGame.userData.originalRot.y, 
                    z: selectedGame.userData.originalRot.z 
                }, 800)
                .easing(TWEEN.Easing.Cubic.InOut)
                .onComplete(() => {
                    isAnimating = false;
                    selectedGame = null;
                })
                .start();

            // Reset TV Glow
            new TWEEN.Tween(tvLight.color)
                .to({ r: 0.0, g: 0.66, b: 1.0 }, 1000)
                .start();
        }

        // --- Camera Animations --- //

        function navigateToShelf() {
            isAnimating = true;
            browseBtn.style.display = 'none';
            backBtn.style.display = 'block';

            new TWEEN.Tween(camera.position)
                .to(CAM_POS_SHELF, 2000)
                .easing(TWEEN.Easing.Cubic.InOut)
                .start();

            new TWEEN.Tween(camTargetObj)
                .to({ x: CAM_TARGET_SHELF.x, y: CAM_TARGET_SHELF.y, z: CAM_TARGET_SHELF.z }, 2000)
                .easing(TWEEN.Easing.Cubic.InOut)
                .onComplete(() => { isAnimating = false; })
                .start();
        }

        function navigateToRoom() {
            if(selectedGame) putGameBack(); // Auto put back if left out

            isAnimating = true;
            backBtn.style.display = 'none';
            browseBtn.style.display = 'block';

            new TWEEN.Tween(camera.position)
                .to(CAM_POS_START, 2000)
                .easing(TWEEN.Easing.Cubic.InOut)
                .start();

            new TWEEN.Tween(camTargetObj)
                .to({ x: CAM_TARGET_START.x, y: CAM_TARGET_START.y, z: CAM_TARGET_START.z }, 2000)
                .easing(TWEEN.Easing.Cubic.InOut)
                .onComplete(() => { isAnimating = false; })
                .start();
        }

        // --- UI Updates --- //
        function showGameUI(data) {
            document.getElementById('gi-title').innerText = data.name || "Unknown";
            document.getElementById('gi-date').innerText = data.release_date || "N/A";
            document.getElementById('gi-genre').innerText = data.genre || "N/A";
            document.getElementById('gi-dev').innerText = data.developer || "N/A";
            document.getElementById('gi-multi').innerText = data.multiplayer || "N/A";
            document.getElementById('gi-rating').innerText = data.aggregated_rating ? parseFloat(data.aggregated_rating).toFixed(1) : "N/A";
            document.getElementById('gi-summary').innerText = data.summary || "No description available.";
            
            giPanel.style.display = 'block';
            setTimeout(() => giPanel.style.opacity = '1', 50);
            backBtn.style.display = 'none';
        }

        function hideGameUI() {
            giPanel.style.opacity = '0';
            setTimeout(() => giPanel.style.display = 'none', 500);
            backBtn.style.display = 'block';
        }

        // --- Core Loop --- //
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            
            // Constantly update camera lookAt based on tween object
            camera.lookAt(camTargetObj.x, camTargetObj.y, camTargetObj.z);

            // TV Flicker Effect
            if(Math.random() > 0.95) {
                tvLight.intensity = 1.4 + Math.random() * 0.3;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
